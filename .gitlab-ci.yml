workflow:
  rules:
    # run MR pipelines
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    # do not run branch pipelines if MR exists
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    # run branch pipelines
    - if: '$CI_COMMIT_BRANCH'

variables:
  GIT_DEPTH: 1
  GIT_SUBMODULE_STRATEGY: recursive
  DIR_WORK: /Users/Shared/work
  CCACHE_DIR: /Users/Shared/work/ccache

stages:
  - build

include:
  - remote: https://raw.githubusercontent.com/dehesselle/sdkchecksum/master/.gitlab-ci/verify_sdk-template.yml

#------------------------------------------------------------------------- build

# Build the dependencies.

build:
  stage: build
  parallel:
    matrix:
      - ARCHITECTURE: [ "x86_64", "arm64" ]
  tags:
    - macos
    - ${ARCHITECTURE}
  variables:
    ORKA_RUNNER: sequoia-8
    SDKROOT: /opt/sdks/MacOSX13.3.sdk
  script:
    - !reference [ .verify_sdk, script ]
    - |
      ./110-bootstrap_jhb.sh
      ./120-build_gtk4.sh
      ./130-build_inkdeps.sh
    - | # build with the runner's SDK (Sequoia) for C++23 support
      if [ "$ARCHITECTURE" = "arm64" ]; then
        unset SDKROOT
        export MACOSX_DEPLOYMENT_TARGET=13.3
        ./140-build_capypdf.sh
      fi
    - | # Artifact size needs to stay below 1 GiB for GitLab.
      jhb/usr/bin/jhb run rustup self uninstall -y
      jhb/usr/bin/archive remove_nonessentials
    - jhb/usr/bin/archive create_dmg
  artifacts:
    paths:
      - jhb*.dmg
